<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | DS Digital Designs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Get in touch with DS Digital Designs. Let's discuss your website project and bring your vision to life.">
<link rel="stylesheet" href="assets/css/theme.css">
</head>
<body>
<div id="header-slot"></div>
<div id="nav-slot"></div>

<main class="page-wrap contact-shell">
  <div class="contact-card">
    <section>
      <h1>Let's talk about your project</h1>
      <p class="page-intro">Share a few details below and I'll review your request personally. I typically respond within 1–2 business days.</p>

      <div class="note-card" style="margin-top:24px;">
        <p><strong>Email:</strong> <a href="mailto:dsdigitaldesigns3455@gmail.com">dsdigitaldesigns3455@gmail.com</a></p>
        <p><strong>Phone / Text:</strong> <a href="tel:+14238232215">423-823-2215</a></p>
      </div>
    </section>

    <section>
      <div class="quote-summary" id="quoteSummary" style="display:none;">
        <h3>Your estimated range</h3>
        <div class="quote-amount" id="quoteAmount"></div>
      </div>

      <form id="contactForm" action="https://formspree.io/f/mdalowdk" method="POST">
        <input type="hidden" name="quoteRange" id="quoteInput">

        <fieldset class="preference-group">
          <legend>How should I contact you?</legend>
          <div class="preference-options">
            <label><input type="radio" name="contactPreference" value="Email" required> Email</label>
            <label><input type="radio" name="contactPreference" value="Text"> Text</label>
            <label><input type="radio" name="contactPreference" value="Both"> Both</label>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="emailField">Email Address</label>
          <input type="email" name="email" id="emailField" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="phoneField">Phone Number</label>
          <input type="tel" name="phone" id="phoneField" placeholder="423-456-7890">
        </div>

        <div class="form-group">
          <label for="projectMessage">Tell me about your project</label>
          <textarea id="projectMessage" name="message" required placeholder="What kind of website do you need? Any specific features or goals?"></textarea>
        </div>

        <div class="actions">
          <button class="next-btn" type="submit">Send Message</button>
        </div>
      </form>
    </section>
  </div>
</main>

<div id="footer-slot"></div>
<script src="assets/js/shell.js"></script>
<script src="assets/js/load-components.js"></script>
<script>
const savedQuote = localStorage.getItem('quoteRange');
if (savedQuote) {
  document.getElementById('quoteAmount').textContent = savedQuote;
  document.getElementById('quoteSummary').style.display = 'block';
  document.getElementById('quoteInput').value = savedQuote;
}
</script>
<script src="chat-widget.js"></script>
</body>
</html>
